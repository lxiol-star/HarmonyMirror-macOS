name: HarmonyMirror
options:
  bundleIdPrefix: com.harmonymirror
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  HarmonyMirror:
    type: application
    platform: macOS
    sources:
      - path: HarmonyMirror
        excludes:
          - "**/.DS_Store"
    resources:
      - path: HarmonyMirror/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.harmonymirror.app
        PRODUCT_NAME: HarmonyMirror
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: HarmonyMirror/HarmonyMirror.entitlements
      properties:
        com.apple.security.app-sandbox: false
  HarmonyMirrorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: HarmonyMirrorTests
    dependencies:
      - target: HarmonyMirror
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
